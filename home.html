<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>allnight.city - EarthBound Test</title>
    <style>
        /* Reset and layout */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The canvas container holding our animation layers */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Layer 2 opacity blend adjustment to let Layer 1 peak through */
        #layer2 {
            mix-blend-mode: difference;
            opacity: 0.75;
        }

        /* Foreground Content */
        .content-overlay {
            position: relative;
            z-index: 10;
            text-align: center;
            user-select: none;
        }

        /* Glowing, shadowed text styling */
        .glowing-text {
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #fff;
            /* Layered text-shadows for the intense neon glow effect */
            text-shadow: 
                0 0 10px #ff007f,
                0 0 20px #ff007f,
                0 0 40px #ff007f,
                0 0 80px #ff007f,
                0 0 120px #00ffff,
                10px 10px 20px rgba(0, 0, 0, 0.9);
            animation: pulse 3s ease-in-out infinite alternate;
        }

        @media (max-width: 768px) {
            .glowing-text {
                font-size: 2.5rem;
            }
        }

        /* Subtle pulsating text effect to match the trippy vibe */
        @keyframes pulse {
            from {
                transform: scale(0.98);
                text-shadow: 
                    0 0 10px #ff007f,
                    0 0 20px #ff007f,
                    0 0 40px #ff007f,
                    10px 10px 20px rgba(0, 0, 0, 0.9);
            }
            to {
                transform: scale(1.02);
                text-shadow: 
                    0 0 15px #ff007f,
                    0 0 30px #00ffff,
                    0 0 60px #00ffff,
                    0 0 100px #00ffff,
                    12px 12px 25px rgba(0, 0, 0, 0.9);
            }
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="layer1"></canvas>
        <canvas id="layer2"></canvas>
    </div>

    <div class="content-overlay">
        <h1 class="glowing-text">allnight.city</h1>
    </div>

    <script>
        const canvas1 = document.getElementById('layer1');
        const ctx1 = canvas1.getContext('2d');
        const canvas2 = document.getElementById('layer2');
        const ctx2 = canvas2.getContext('2d');

        let width, height;
        let tick = 0;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            
            // Setting internal canvas dimensions
            canvas1.width = width;
            canvas1.height = height;
            canvas2.width = width;
            canvas2.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- LAYER 1 ANIMATION: Psychedelic Wave Grid ---
        function drawLayer1() {
            ctx1.fillStyle = '#110022';
            ctx1.fillRect(0, 0, width, height);

            const gridSize = 40;
            ctx1.lineWidth = 2;

            for (let x = 0; x < width; x += gridSize) {
                ctx1.beginPath();
                for (let y = 0; y < height; y += 5) {
                    // Earthbound-style horizontal distortion using sine math over time
                    const distortion = Math.sin(y * 0.015 + tick * 0.05) * 35;
                    // Color cycling logic
                    const hue = (x + tick * 0.5) % 360;
                    ctx1.strokeStyle = `hsl(${hue}, 80%, 50%)`;
                    
                    if (y === 0) {
                        ctx1.moveTo(x + distortion, y);
                    } else {
                        ctx1.lineTo(x + distortion, y);
                    }
                }
                ctx1.stroke();
            }
        }

        // --- LAYER 2 ANIMATION: Moire Vortex / Tunnel effect ---
        function drawLayer2() {
            ctx2.clearRect(0, 0, width, height);
            
            const centerX = width / 2;
            const centerY = height / 2;
            const maxRadius = Math.max(width, height) * 0.8;

            for (let r = maxRadius; r > 0; r -= 15) {
                ctx2.beginPath();
                
                // Pulsate the radius dynamically over time
                const dynamicRadius = r + Math.sin(r * 0.02 - tick * 0.08) * 20;
                
                // Shift the center slightly over time for a sweeping vortex look
                const shiftX = centerX + Math.cos(tick * 0.02 + r * 0.005) * 50;
                const shiftY = centerY + Math.sin(tick * 0.03 + r * 0.005) * 50;

                ctx2.arc(shiftX, shiftY, Math.max(0, dynamicRadius), 0, Math.PI * 2);
                
                // High contrast cycling palette
                const hue = (r * 0.5 - tick * 1.5) % 360;
                ctx2.fillStyle = `hsl(${hue}, 90%, 40%)`;
                ctx2.fill();
            }
        }

        // --- MAIN ENGINE LOOP ---
        function loop() {
            tick++;
            drawLayer1();
            drawLayer2();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
